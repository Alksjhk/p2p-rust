name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: p2p-rust.exe
            archive: p2p-rust-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: p2p-rust
            archive: p2p-rust-linux-x86_64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" .
          Compress-Archive -Path "${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" .
          tar czf "${{ matrix.archive }}" "${{ matrix.binary }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
